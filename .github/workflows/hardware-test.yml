name: Hardware Tests

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-permission:
    name: Check permission
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/test')
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
    steps:
      - name: Check commenter permission
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            const authorized = ['admin', 'write'].includes(data.permission);
            core.setOutput('authorized', authorized.toString());
            if (!authorized) {
              core.warning(`User ${context.payload.comment.user.login} does not have write access.`);
            }

      - name: Add reaction
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Get PR details
        id: pr
        if: steps.check.outputs.authorized == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_sha', data.head.sha);

  linux-hardware-tests:
    name: Linux hardware tests
    needs: check-permission
    if: needs.check-permission.outputs.authorized == 'true'
    runs-on: [self-hosted, nixos, can-bus]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-permission.outputs.head_sha }}

      - name: Run hardware tests
        run: cargo test -p hardware-tests -- --test-threads=1

  windows-hardware-tests:
    name: Windows hardware tests
    needs: [check-permission, linux-hardware-tests]
    if: needs.check-permission.outputs.authorized == 'true'
    runs-on: [self-hosted, nixos, can-bus]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-permission.outputs.head_sha }}

      - name: Start Windows VM
        run: ci-vm-start

      - name: Wait for VM SSH
        run: ci-vm-wait-ssh

      - name: Attach USB devices to VM
        run: ci-usb-to-vm

      - name: Copy source to VM
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no -i /var/lib/github-runner/win-test-ssh-key" \
            . ci@192.168.122.10:~/can-hal-rs/

      - name: Run hardware tests (Windows)
        run: |
          ssh -o StrictHostKeyChecking=no -i /var/lib/github-runner/win-test-ssh-key \
            ci@192.168.122.10 \
            "cd can-hal-rs && cargo test -p hardware-tests -- --test-threads=1"

      - name: Return USB to host
        if: always()
        run: ci-usb-to-host

      - name: Stop Windows VM
        if: always()
        run: ci-vm-stop

      - name: Report result
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? ':white_check_mark:' : ':x:';
            const body = `${status} **Hardware tests ${('${{ job.status }}')}**\n\n` +
              `- Linux tests: ${{ needs.linux-hardware-tests.result }}\n` +
              `- Windows tests: ${{ job.status }}\n\n` +
              `Commit: ${{ needs.check-permission.outputs.head_sha }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
