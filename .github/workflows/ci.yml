name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo clippy -p can-hal-rs -p can-hal-isotp --all-targets --features async -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test -p can-hal-rs -p can-hal-isotp --features async

  build-check:
    name: Build check (hardware crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # can-hal-socketcan depends on the `socketcan` crate which builds
      # against Linux headers available on ubuntu-latest.
      - run: cargo check -p can-hal-socketcan
      - run: cargo clippy -p can-hal-pcan -p can-hal-kvaser --all-targets -- -D warnings

  build-check-windows:
    name: Build check (Windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo clippy -p can-hal-pcan -p can-hal-kvaser --target x86_64-pc-windows-gnu --all-targets -- -D warnings
